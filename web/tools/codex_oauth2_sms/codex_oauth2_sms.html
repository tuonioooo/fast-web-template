<html lang="zh-CN">

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #00e5ff;
      --accent2: #7c6fff;
      --success: #00e096;
      --danger: #ff5370;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper { position: relative; z-index: 1; }

    /* Header */
    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span { color: var(--text); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Stats */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      flex: 1;
      background: var(--surface);
      padding: 14px 24px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Controls */
    .controls-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .form-control, .form-select {
      background: var(--surface2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .form-control::placeholder { color: var(--muted); }

    .form-control:focus, .form-select:focus {
      box-shadow: 0 0 0 2px rgba(0,229,255,0.2) !important;
      border-color: var(--accent) !important;
      outline: none;
    }

    .form-select option { background: #1c2030; }

    .count-badge {
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .action-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      padding: 7px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,255,0.08);
    }

    .platform-cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 280px;
    }

    .platform-summary {
      font-size: 0.7rem;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
      white-space: normal;
    }

    .platform-summary.is-empty {
      color: var(--muted);
    }

    .platform-editor {
      display: grid;
      grid-template-columns: minmax(76px, 90px) minmax(92px, 120px) minmax(88px, 104px);
      gap: 8px;
      align-items: center;
    }

    .platform-editor.is-disabled {
      opacity: 0.6;
    }

    .platform-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .platform-link:hover {
      color: var(--text);
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      padding: 24px 32px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.65rem;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th:first-child { border-radius: 8px 0 0 0; }
    thead th:last-child  { border-radius: 0 8px 0 0; }

    tbody tr {
      transition: background 0.15s;
      animation: rowIn 0.25s ease both;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody tr:hover td { background: var(--surface2); }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      vertical-align: middle;
      white-space: nowrap;
    }

    .country-name { font-weight: 600; color: var(--text); }
    .dial-code    { color: var(--accent2); }
    .row-num      { color: var(--muted); font-size: 0.65rem; }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.25s;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(0,224,150,0.15);
      border-color: var(--success);
    }

    .toggle input:checked + .toggle-track::after {
      left: 21px;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .toggle-label {
      font-size: 0.72rem;
      font-family: 'Syne', sans-serif;
      min-width: 36px;
    }

    .label-on  { color: var(--success); }
    .label-off { color: var(--muted); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 32px;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.3; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast-msg {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
      animation: toastIn 0.3s ease;
      border-left: 3px solid var(--success);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>

<div class="page-wrapper">

  </div>

    </div>

      <div class="stat-label">支持短信</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statWa">0</div>
      <div class="stat-label">支持 WhatsApp</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statBoth">0</div>
      <div class="stat-label">两者皆支持</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-panel">
    <span class="ctrl-label">搜索</span>
    <input type="text" id="search" class="form-control" placeholder="国家 / 区号..." style="width:180px;" oninput="applyFilter()">

    <span class="ctrl-label" style="margin-left:8px;">短信</span>
    <select id="smsFilter" class="form-select" style="width:130px;" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="yes">支持</option>
      <option value="no">不支持</option>
    </select>

    <span class="ctrl-label">WhatsApp</span>
    <select id="waFilter" class="form-select" style="width:130px;" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="yes">支持</option>
      <option value="no">不支持</option>
    </select>

    <span class="ctrl-label">检查状态</span>
    <select id="checkedFilter" class="form-select" style="width:130px;" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="yes">已检查</option>
      <option value="no">未检查</option>
    </select>

    <span class="ctrl-label">收码平台</span>
    <select id="smsPlatformSelect" class="form-select" style="width:190px;" onchange="applyFilter()"></select>

    <span class="ctrl-label">当前列过滤</span>
    <select id="smsNumberFilter" class="form-select" style="width:130px;" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="has">有号</option>
      <option value="none">无号</option>
    </select>

    <button type="button" class="action-btn" id="smsNumberSortBtn" onclick="toggleSmsNumberSort()">
      <i class="fas fa-sort-amount-down"></i> 当前列倒序：关
    </button>
    <a id="smsPlatformLink" class="platform-link" href="#" target="_blank" rel="noopener noreferrer">平台维护</a>

    <button type="button" class="action-btn" onclick="exportTxt()">
      <i class="fas fa-file-export"></i> 导出 TXT
    </button>
    <button type="button" class="action-btn" onclick="triggerImportTxt()">
      <i class="fas fa-file-import"></i> 导入 TXT
    </button>
    <button type="button" class="action-btn" onclick="resetToInitialData()">
      <i class="fas fa-rotate-left"></i> 恢复初始化数据
    </button>
    <input type="file" id="txtFileInput" accept=".txt,text/plain" style="display:none;" onchange="importTxt(event)">

    <span id="countBadge" class="count-badge ms-auto">0 个国家</span>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div id="tableArea"></div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

// ─── 状态（可被 toggle 修改）────────────────────────────
const SMS_PLATFORMS = [
  {
    key: 'sms-verification-number',
    label: 'sms-verfication-number',
    url: 'https://sms-verification-number.com/cn/?ref=1708633011'
  }
];
const DEFAULT_SMS_PLATFORM_KEY = SMS_PLATFORMS[0].key;
const STORAGE_KEY = 'verifymap-countries-data';
const STORAGE_PLATFORM_KEY = 'verifymap-current-platform';
const INITIAL_DATA_URL = './countries-support.txt';
let smsNumberSortDesc = false;
const defaultState = countries.map(c => normalizeCountry(c, 0));
const state = loadInitialState();
let filtered = [...state];

function getPlatformKeys() {
  return SMS_PLATFORMS.map(platform => platform.key);
}

function createDefaultSmsPlatformData(overrides = {}) {
  return {
    status: 'none',
    price: '',
    receiveRate: 'medium',
    ...overrides
  };
}

function normalizeSmsPlatformData(item = {}) {
  const status = item.status === 'has' ? 'has' : 'none';
  const price = status === 'has'
    ? String(item.price ?? '$0.01').trim() || '$0.01'
    : '';
  const receiveRate = ['high', 'medium', 'low'].includes(item.receiveRate)
    ? item.receiveRate
    : 'medium';

  return createDefaultSmsPlatformData({
    status,
    price,
    receiveRate
  });
}

function normalizeSmsPlatforms(item = {}) {
  const fromCurrent = item.smsVerificationPlatforms && typeof item.smsVerificationPlatforms === 'object'
    ? item.smsVerificationPlatforms
    : {};
  const fromLegacy = item.smsVerificationNumber && typeof item.smsVerificationNumber === 'object'
    ? { [DEFAULT_SMS_PLATFORM_KEY]: item.smsVerificationNumber }
    : {};
  const merged = { ...fromLegacy, ...fromCurrent };

  return getPlatformKeys().reduce((result, key) => {
    result[key] = normalizeSmsPlatformData(merged[key]);
    return result;
  }, {});
}

function getCurrentPlatformKey() {
  const select = document.getElementById('smsPlatformSelect');
  return select?.value || localStorage.getItem(STORAGE_PLATFORM_KEY) || DEFAULT_SMS_PLATFORM_KEY;
}

function getCurrentPlatformMeta() {
  return SMS_PLATFORMS.find(platform => platform.key === getCurrentPlatformKey()) || SMS_PLATFORMS[0];
}

function getCurrentPlatformData(item) {
  return item.smsVerificationPlatforms?.[getCurrentPlatformKey()] || createDefaultSmsPlatformData();
}

function statusRank(status) {
  return status === 'has' ? 1 : 0;
}

function priceRank(price) {
  const value = Number(String(price || '').replace(/[^0-9.]/g, ''));
  return Number.isFinite(value) ? value : 0;
}

function loadInitialState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState.map(item => ({ ...item }));

    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) {
      throw new Error('localStorage data is not array');
    }

    return parsed.map(normalizeCountry);
  } catch (error) {
    console.warn('load saved countries failed:', error);
    return defaultState.map(item => ({ ...item }));
  }
}

function hasStoredState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;

    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length > 0;
  } catch (error) {
    console.warn('check saved countries failed:', error);
    return false;
  }
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function replaceState(nextItems) {
  state.splice(0, state.length, ...nextItems.map(item => normalizeCountry(item, 0)));
  persistState();
}

async function loadRemoteInitialState() {
  const response = await fetch(INITIAL_DATA_URL, { cache: 'no-store' });
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }

  const text = (await response.text()).trim();
  if (!text) {
    throw new Error('初始化数据为空');
  }

  const parsed = JSON.parse(text);
  if (!Array.isArray(parsed)) {
    throw new Error('初始化 TXT 内容必须是 JSON 数组');
  }

  return parsed.map(normalizeCountry);
}

function normalizeCountry(item, index) {
  if (!item || typeof item !== 'object') {
    throw new Error(`第 ${index + 1} 条不是有效对象`);
  }

  const name = String(item.name ?? '').trim();
  const code = String(item.code ?? '').trim().toUpperCase();
  const dial = String(item.dial ?? '').trim();

  if (!name || !code || !dial) {
    throw new Error(`第 ${index + 1} 条缺少 name/code/dial 必填字段`);
  }

  return {
    name,
    code,
    dial,
    sms: Boolean(item.sms),
    wa: Boolean(item.wa),
    checked: Boolean(item.checked),
    smsVerificationPlatforms: normalizeSmsPlatforms(item)
  };
}

// ─── 过滤 ────────────────────────────────────────────────
function applyFilter() {
  localStorage.setItem(STORAGE_PLATFORM_KEY, getCurrentPlatformKey());
  const q               = document.getElementById('search').value.toLowerCase();
  const sms             = document.getElementById('smsFilter').value;
  const wa              = document.getElementById('waFilter').value;
  const checked         = document.getElementById('checkedFilter').value;
  const smsNumberFilter = document.getElementById('smsNumberFilter').value;

  filtered = state.filter(c => {
    const platformData = getCurrentPlatformData(c);
    if (q && !c.name.toLowerCase().includes(q) && !c.dial.includes(q)) return false;
    if (sms === 'yes' && !c.sms) return false;
    if (sms === 'no'  &&  c.sms) return false;
    if (wa  === 'yes' && !c.wa)  return false;
    if (wa  === 'no'  &&  c.wa)  return false;
    if (checked === 'yes' && !c.checked) return false;
    if (checked === 'no'  &&  c.checked) return false;
    if (smsNumberFilter === 'has' && platformData.status !== 'has') return false;
    if (smsNumberFilter === 'none' && platformData.status !== 'none') return false;
    return true;
  });

  if (smsNumberSortDesc) {
    filtered.sort((a, b) => {
      const platformA = getCurrentPlatformData(a);
      const platformB = getCurrentPlatformData(b);

      if (statusRank(platformA.status) !== statusRank(platformB.status)) {
        return statusRank(platformB.status) - statusRank(platformA.status);
      }

      if (priceRank(platformA.price) !== priceRank(platformB.price)) {
        return priceRank(platformB.price) - priceRank(platformA.price);
      }

      return a.name.localeCompare(b.name, 'zh-CN');
    });
  }

  syncPlatformUi();
  render();
}

// ─── Toggle ──────────────────────────────────────────────
function toggleField(code, field) {
  const item = state.find(c => c.code === code);
  if (!item) return;
  item[field] = !item[field];
  const fieldLabels = {
    sms: ['短信验证码', '✅ 支持', '❌ 不支持'],
    wa: ['WhatsApp验证码', '✅ 支持', '❌ 不支持'],
    checked: ['检查状态', '已检查', '未检查']
  };
  const [label, onText, offText] = fieldLabels[field] || [field, '已开启', '已关闭'];
  persistState();
  toast(`${item.name} · ${label} → ${item[field] ? onText : offText}`);
  applyFilter();
  updateStats();
}

// ─── 渲染 ────────────────────────────────────────────────
function toggleSmsNumberSort() {
  smsNumberSortDesc = !smsNumberSortDesc;
  syncPlatformUi();
  applyFilter();
}

function syncPlatformUi() {
  const currentPlatform = getCurrentPlatformMeta();
  const sortBtn = document.getElementById('smsNumberSortBtn');
  const link = document.getElementById('smsPlatformLink');

  if (sortBtn) {
    sortBtn.innerHTML = `<i class="fas fa-sort-amount-down"></i> 当前列倒序：${smsNumberSortDesc ? '开' : '关'}`;
  }

  if (link) {
    link.href = currentPlatform.url;
    link.textContent = `${currentPlatform.label} 维护`;
  }
}

function initPlatformControls() {
  const select = document.getElementById('smsPlatformSelect');
  if (!select) return;

  select.innerHTML = SMS_PLATFORMS.map(platform => `
    <option value="${platform.key}">${platform.label}</option>
  `).join('');

  const savedPlatform = localStorage.getItem(STORAGE_PLATFORM_KEY);
  const currentPlatform = SMS_PLATFORMS.some(platform => platform.key === savedPlatform)
    ? savedPlatform
    : DEFAULT_SMS_PLATFORM_KEY;

  select.value = currentPlatform;
  localStorage.setItem(STORAGE_PLATFORM_KEY, currentPlatform);
  syncPlatformUi();
}

function toggleHtml(code, field, val) {
  const id = `toggle-${code}-${field}`;
  const labels = field === 'checked'
    ? ['已检查', '未检查']
    : ['支持', '不支持'];
  return `
    <label class="toggle" title="点击切换">
      <input type="checkbox" id="${id}" ${val ? 'checked' : ''} onchange="toggleField('${code}','${field}')">
      <div class="toggle-track"></div>
    </label>
    <span class="toggle-label ${val ? 'label-on' : 'label-off'}" id="lbl-${code}-${field}">
      ${val ? labels[0] : labels[1]}
    </span>`;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function receiveRateText(rate) {
  return {
    high: '极高',
    medium: '中',
    low: '低'
  }[rate] || '中';
}

function getSmsVerificationSummary(data) {
  if (data.status !== 'has') return '无号';
  return `有号-价格：(${data.price || '$0.01'})-接受率：${receiveRateText(data.receiveRate)}`;
}

function updateSmsPlatformField(code, field, value) {
  const item = state.find(c => c.code === code);
  if (!item) return;

  const platformKey = getCurrentPlatformKey();
  const current = item.smsVerificationPlatforms?.[platformKey] || createDefaultSmsPlatformData();
  const next = { ...current };

  if (field === 'status') {
    next.status = value === 'has' ? 'has' : 'none';
    if (next.status === 'has' && !next.price) {
      next.price = '$0.01';
    }
    if (next.status === 'none') {
      next.price = '';
      next.receiveRate = 'medium';
    }
  }

  if (field === 'price') {
    next.price = String(value ?? '').trim();
  }

  if (field === 'receiveRate') {
    next.receiveRate = ['high', 'medium', 'low'].includes(value) ? value : 'medium';
  }

  item.smsVerificationPlatforms = {
    ...item.smsVerificationPlatforms,
    [platformKey]: normalizeSmsPlatformData(next)
  };

  persistState();
  applyFilter();
  toast(`${item.name} · ${getCurrentPlatformMeta().label} 已更新`);
}

function smsVerificationCellHtml(code, platformData) {
  const disabled = platformData.status !== 'has';
  return `
    <div class="platform-cell">
      <div class="platform-summary ${disabled ? 'is-empty' : ''}">
        ${getSmsVerificationSummary(platformData)}
      </div>
      <div class="platform-editor ${disabled ? 'is-disabled' : ''}">
        <select class="form-select" onchange="updateSmsPlatformField('${code}', 'status', this.value)">
          <option value="has" ${platformData.status === 'has' ? 'selected' : ''}>有号</option>
          <option value="none" ${platformData.status === 'none' ? 'selected' : ''}>无号</option>
        </select>
        <input
          type="text"
          class="form-control"
          placeholder="$0.01"
          value="${escapeHtml(platformData.price)}"
          ${disabled ? 'disabled' : ''}
          onchange="updateSmsPlatformField('${code}', 'price', this.value)">
        <select
          class="form-select"
          ${disabled ? 'disabled' : ''}
          onchange="updateSmsPlatformField('${code}', 'receiveRate', this.value)">
          <option value="high" ${platformData.receiveRate === 'high' ? 'selected' : ''}>高</option>
          <option value="medium" ${platformData.receiveRate === 'medium' ? 'selected' : ''}>中</option>
          <option value="low" ${platformData.receiveRate === 'low' ? 'selected' : ''}>低</option>
        </select>
      </div>
    </div>`;
}

function render() {
  const area = document.getElementById('tableArea');
  document.getElementById('countBadge').textContent = filtered.length + ' 个国家';
  const currentPlatform = getCurrentPlatformMeta();

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-search"></i></div>
        <div style="font-size:0.85rem;">未找到匹配的国家</div>
      </div>`;
    return;
  }

  const rows = filtered.map((c, i) => `
    <tr style="animation-delay:${i * 0.02}s">
      <td class="row-num">${String(i+1).padStart(3,'0')}</td>
      <td>
        <span style="font-size:1.1rem;margin-right:8px;">${getFlagEmoji(c.code)}</span>
        <span class="country-name">${c.name}</span>
      </td>
      <td class="dial-code">${c.dial}</td>
      <td>
        <div class="toggle-wrap">
          ${toggleHtml(c.code, 'sms', c.sms)}
        </div>
      </td>
      <td>
        <div class="toggle-wrap">
          ${toggleHtml(c.code, 'wa', c.wa)}
        </div>
      </td>
      <td>
        <div class="toggle-wrap">
          ${toggleHtml(c.code, 'checked', c.checked)}
        </div>
      </td>
      <td>
        ${smsVerificationCellHtml(c.code, getCurrentPlatformData(c))}
      </td>
    </tr>`).join('');

  area.innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:48px;">#</th>
          <th style="width:200px;">国家</th>
          <th style="width:80px;">区号</th>
          <th style="width:140px;text-align:center;">手机验证码</th>
          <th style="width:160px;text-align:center;">WhatsApp验证码</th>
          <th style="width:140px;text-align:center;">检查</th>
          <th style="width:320px;">${currentPlatform.label}</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;

  updateStats();
}

function updateStats() {
  document.getElementById('statTotal').textContent = state.length;
  document.getElementById('statSms').textContent   = state.filter(c => c.sms).length;
  document.getElementById('statWa').textContent    = state.filter(c => c.wa).length;
  document.getElementById('statBoth').textContent  = state.filter(c => c.sms && c.wa).length;
}

function serializeCountry(item) {
  return {
    ...item,
    smsVerificationNumber: item.smsVerificationPlatforms?.[DEFAULT_SMS_PLATFORM_KEY] || createDefaultSmsPlatformData()
  };
}

function exportTxt() {
  const content = JSON.stringify(state.map(serializeCountry), null, 2);
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const link = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');

  link.href = URL.createObjectURL(blob);
  link.download = `countries-support-${stamp}.txt`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
  toast('当前数据已导出为 TXT');
}

function triggerImportTxt() {
  const input = document.getElementById('txtFileInput');
  input.value = '';
  input.click();
}

function importTxt(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = String(e.target.result || '').trim();
      if (!text) {
        throw new Error('文件内容为空');
      }

      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) {
        throw new Error('TXT 内容必须是 JSON 数组');
      }

      const nextState = parsed.map(normalizeCountry);
      replaceState(nextState);
      applyFilter();
      updateStats();
      toast(`已导入 ${state.length} 条数据，并覆盖默认数据`);
    } catch (error) {
      toast(`导入失败：${error.message}`);
    } finally {
      event.target.value = '';
    }
  };

  reader.onerror = () => {
    toast('导入失败：文件读取异常');
    event.target.value = '';
  };

  reader.readAsText(file, 'utf-8');
}

async function resetToInitialData() {
  try {
    const nextState = await loadRemoteInitialState();
    replaceState(nextState);
    filtered = [...state];
    applyFilter();
    updateStats();
    toast(`已恢复 ${state.length} 条初始化数据`);
  } catch (error) {
    console.warn('reset countries failed:', error);
    toast(`恢复失败：${error.message}`);
  }
}

// ─── 国旗 emoji ──────────────────────────────────────────
function getFlagEmoji(code) {
  if (!code || code.length !== 2) return '🌐';
  return code.toUpperCase().replace(/./g, ch =>
    String.fromCodePoint(0x1F1E6 - 65 + ch.charCodeAt(0))
  );
}

// ─── Toast ───────────────────────────────────────────────
function toast(msg) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ─── 初始化 ──────────────────────────────────────────────
async function initializeApp() {
  initPlatformControls();

  if (!hasStoredState()) {
    try {
      const remoteState = await loadRemoteInitialState();
      replaceState(remoteState);
      filtered = [...state];
      toast(`已自动加载 ${state.length} 条初始化数据`);
    } catch (error) {
      console.warn('load remote countries failed:', error);
      persistState();
    }
  }

  applyFilter();
}

initializeApp();
</script>
